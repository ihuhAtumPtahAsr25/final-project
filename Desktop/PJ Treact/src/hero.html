<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="./components/input.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Section</title>

  <!-- Link to your CSS file -->
  <link rel="stylesheet" href="./components/input.css">
</head>
<body>

<section class="hero">
  <section id="hero" class="px-8 py-16 md:px-12 lg:px-24 flex flex-col lg:flex-row items-center">
  <!-- LEFT TEXT COLUMN -->
  <div class="flex-1 max-w-xl">
    <h1 class="text-4xl md:text-5xl font-bold text-gray-900 leading-tight">
      Beautiful React Templates <span class="text-purple-600">for You</span>
    </h1>

    <p class="mt-6 text-gray-700 text-lg leading-relaxed">
      Our templates are easy to customize and perfect for your next project.
    </p>

    <div class="mt-8 flex flex-col sm:flex-row gap-4">
      <a href="#pricing"
         class="bg-purple-600 hover:bg-purple-700 text-white font-semibold px-8 py-4 rounded-lg transition">
        Get Started
      </a>

      <input type="email"
             placeholder="Your E-mail Address"
             class="border border-gray-300 px-4 py-3 rounded-lg w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-purple-600" />
    </div>

    <p class="mt-4 text-sm text-gray-500">
      Our customers love our templates.
    </p>
  </div>

  <!-- RIGHT IMAGE COLUMN -->
  <div class="flex-1 mt-12 lg:mt-0 flex justify-center">
    <img src="images/hero.png"
         alt="Hero Image"
         class="w-full max-w-lg rounded-lg shadow-lg" />
  </div>
</section>

</section>

</body>
</html>
